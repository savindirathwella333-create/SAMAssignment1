<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAM Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="styles/main.css" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .nav-tabs .nav-link {
            color: #aaa;
        }
        .nav-tabs .nav-link.active {
            background-color: #00adb5;
            color: #fff;
            border-color: #00adb5;
        }
        .form-control {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
        }
        .form-control:focus {
            background: #2a2a2a;
            border-color: #00adb5;
            color: #fff;
            box-shadow: 0 0 0 0.2rem rgba(0,173,181,0.25);
        }
        .btn-primary {
            background-color: #00adb5;
            border-color: #00adb5;
        }
        .btn-primary:hover {
            background-color: #009099;
            border-color: #009099;
        }
    </style>
</head>
<body>

    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <h3 class="text-light fw-bold">
                <i class="bi bi-briefcase-fill text-primary me-2"></i>SAM Portfolio
            </h3>
            <p class="text-muted small">Sign in to your account</p>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" id="authTabs">
            <li class="nav-item w-50">
                <button class="nav-link active w-100" data-bs-toggle="tab" data-bs-target="#loginPane">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </button>
            </li>
            <li class="nav-item w-50">
                <button class="nav-link w-100" data-bs-toggle="tab" data-bs-target="#registerPane">
                    <i class="bi bi-person-plus me-1"></i>Register
                </button>
            </li>
        </ul>

        <div class="tab-content">

            <!-- ── Login Pane ── -->
            <div class="tab-pane fade show active" id="loginPane">
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-light">Email Address</label>
                        <input type="email" class="form-control" id="loginEmail"
                               placeholder="john@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" class="form-control" id="loginPassword"
                               placeholder="••••••••" required>
                    </div>
                    <div id="loginAlert" class="alert d-none"></div>
                    <button type="submit" class="btn btn-primary w-100 mb-3" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Login
                    </button>
                    <p class="text-center text-muted small">
                        <a href="index.html" class="text-primary">← Back to Home</a>
                    </p>
                </form>
            </div>

            <!-- ── Register Pane ── -->
            <div class="tab-pane fade" id="registerPane">
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label text-light">Username</label>
                        <input type="text" class="form-control" id="regUsername"
                               placeholder="johndoe" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Email Address</label>
                        <input type="email" class="form-control" id="regEmail"
                               placeholder="john@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-light">Password</label>
                        <input type="password" class="form-control" id="regPassword"
                               placeholder="Min. 6 characters" required>
                    </div>
                    <div id="registerAlert" class="alert d-none"></div>
                    <button type="submit" class="btn btn-primary w-100 mb-3" id="registerBtn">
                        <i class="bi bi-person-plus me-1"></i>Create Account
                    </button>
                    <p class="text-center text-muted small">
                        <a href="index.html" class="text-primary">← Back to Home</a>
                    </p>
                </form>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/api.js"></script>
    <script src="scripts/auth-ui.js"></script>
</body>
</html>
