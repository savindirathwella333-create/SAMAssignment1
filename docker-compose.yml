services:

  # ── Frontend (Nginx) ─────────────────────────────────────
  web:
    build: .
    container_name: sam-frontend
    ports:
      - "8081:80"
    volumes:
      - ./src:/usr/share/nginx/html  # ← Live reload src files
    depends_on:
      - backend
    networks:
      - sam-network
    restart: unless-stopped

  # ── Backend (Node.js/Express) ────────────────────────────
  backend:
    build: ./backend
    container_name: sam-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb+srv://tharindusabaragamuwa9920_db_user:992040084v@cluster0.mcsukz0.mongodb.net/SAM?appName=Cluster0
      - JWT_SECRET=your_super_secret_key_change_this_in_production
      - JWT_EXPIRES_IN=7d
      - FRONTEND_URL=http://localhost:8081
    networks:
      - sam-network
    restart: unless-stopped

networks:
  sam-network:
    driver: bridge