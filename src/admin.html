<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SAM Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }

        /* ── Sidebar ── */
        .sidebar {
            width: 250px; height: 100vh; background: #1a1a2e;
            position: fixed; top: 0; left: 0;
            display: flex; flex-direction: column;
            border-right: 1px solid #2a2a4a; z-index: 100;
        }
        .sidebar-brand {
            padding: 1.5rem; border-bottom: 1px solid #2a2a4a;
            font-size: 1.1rem; font-weight: 700; color: #00adb5;
        }
        .sidebar-nav { flex: 1; padding: 1rem 0; }
        .sidebar-link {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.75rem 1.5rem; color: #aaa;
            text-decoration: none; transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .sidebar-link:hover, .sidebar-link.active {
            color: #00adb5; background: rgba(0,173,181,0.1);
            border-left-color: #00adb5;
        }
        .sidebar-footer {
            padding: 1rem 1.5rem; border-top: 1px solid #2a2a4a;
        }

        /* ── Main Content ── */
        .main-content { margin-left: 250px; padding: 2rem; min-height: 100vh; }

        /* ── Top Bar ── */
        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 2rem; padding-bottom: 1rem;
            border-bottom: 1px solid #2a2a2a;
        }
        .topbar h4 { margin: 0; color: #fff; }

        /* ── Stats Cards ── */
        .stat-card {
            background: #1e1e2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: 1.5rem;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-icon {
            width: 50px; height: 50px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; margin-bottom: 1rem;
        }
        .stat-number { font-size: 2rem; font-weight: 700; color: #fff; }
        .stat-label  { color: #888; font-size: 0.85rem; }

        /* ── Table ── */
        .admin-table {
            background: #1e1e2e; border-radius: 12px;
            border: 1px solid #2a2a4a; overflow: hidden;
        }
        .admin-table .table {
            color: #e0e0e0; margin: 0;
        }
        .admin-table .table thead th {
            background: #16213e; border-color: #2a2a4a;
            color: #00adb5; font-weight: 600;
        }
        .admin-table .table tbody td { border-color: #2a2a2a; vertical-align: middle; }
        .admin-table .table tbody tr:hover { background: rgba(0,173,181,0.05); }

        /* ── Modals ── */
        .modal-content { background: #1e1e2e; color: #e0e0e0; border: 1px solid #2a2a4a; }
        .modal-header  { border-bottom: 1px solid #2a2a4a; }
        .modal-footer  { border-top: 1px solid #2a2a4a; }
        .form-control, .form-select {
            background: #2a2a3a; border: 1px solid #3a3a5a;
            color: #e0e0e0;
        }
        .form-control:focus, .form-select:focus {
            background: #2a2a3a; border-color: #00adb5;
            color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(0,173,181,0.25);
        }
        .form-label { color: #aaa; font-size: 0.9rem; }

        /* ── Badges ── */
        .tag-badge {
            background: rgba(0,173,181,0.2); color: #00adb5;
            border: 1px solid rgba(0,173,181,0.3);
            padding: 2px 8px; border-radius: 20px;
            font-size: 0.75rem; margin: 2px;
            display: inline-block;
        }

        /* ── Buttons ── */
        .btn-primary   { background: #00adb5; border-color: #00adb5; }
        .btn-primary:hover { background: #009099; border-color: #009099; }
        .btn-teal      { background: rgba(0,173,181,0.2); color: #00adb5; border: 1px solid #00adb5; }

        /* ── Section Panel ── */
        .panel {
            background: #1e1e2e; border: 1px solid #2a2a4a;
            border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem;
        }
        .panel-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 1.5rem;
        }
        .panel-title { font-size: 1.1rem; font-weight: 600; color: #fff; margin: 0; }

        /* ── Loading ── */
        .loading-spinner {
            display: flex; justify-content: center;
            align-items: center; padding: 3rem;
        }
        .empty-state {
            text-align: center; padding: 3rem; color: #888;
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-content { margin-left: 0; }
        }
    </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────── -->
<div class="sidebar">
    <div class="sidebar-brand">
        <i class="bi bi-speedometer2 me-2"></i>Admin Panel
    </div>
    <nav class="sidebar-nav">
        <a href="#" class="sidebar-link active" onclick="showSection('dashboard')">
            <i class="bi bi-grid-1x2-fill"></i> Dashboard
        </a>
        <a href="#" class="sidebar-link" onclick="showSection('projects')">
            <i class="bi bi-folder-fill"></i> Projects
        </a>
        <a href="index.html" class="sidebar-link">
            <i class="bi bi-house-fill"></i> View Site
        </a>
    </nav>
    <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2 mb-2">
            <div style="width:35px;height:35px;background:#00adb5;border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i class="bi bi-person-fill"></i>
            </div>
            <div>
                <div style="font-size:0.85rem;font-weight:600;" id="adminName">Admin</div>
                <div style="font-size:0.75rem;color:#888;">Administrator</div>
            </div>
        </div>
        <button class="btn btn-outline-danger btn-sm w-100" onclick="handleLogout()">
            <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
    </div>
</div>

<!-- ── Main Content ────────────────────────────────────── -->
<div class="main-content">

    <!-- ── Dashboard Section ── -->
    <div id="sectionDashboard">
        <div class="topbar">
            <h4><i class="bi bi-grid-1x2-fill me-2 text-primary"></i>Dashboard</h4>
            <span class="text-muted small" id="currentDate"></span>
        </div>

        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(0,173,181,0.2);color:#00adb5;">
                        <i class="bi bi-folder-fill"></i>
                    </div>
                    <div class="stat-number" id="statProjects">0</div>
                    <div class="stat-label">Total Projects</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(40,167,69,0.2);color:#28a745;">
                        <i class="bi bi-star-fill"></i>
                    </div>
                    <div class="stat-number" id="statFeatured">0</div>
                    <div class="stat-label">Featured Projects</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="stat-icon" style="background:rgba(255,193,7,0.2);color:#ffc107;">
                        <i class="bi bi-tags-fill"></i>
                    </div>
                    <div class="stat-number" id="statTags">0</div>
                    <div class="stat-label">Unique Tags</div>
                </div>
            </div>
        </div>

        <!-- Recent Projects -->
        <div class="panel">
            <div class="panel-header">
                <h5 class="panel-title"><i class="bi bi-clock-history me-2"></i>Recent Projects</h5>
                <button class="btn btn-primary btn-sm" onclick="showSection('projects')">
                    View All
                </button>
            </div>
            <div id="recentProjectsList">
                <div class="loading-spinner">
                    <div class="spinner-border text-primary"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Projects Section ── -->
    <div id="sectionProjects" class="d-none">
        <div class="topbar">
            <h4><i class="bi bi-folder-fill me-2 text-primary"></i>Manage Projects</h4>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal" onclick="openAddModal()">
                <i class="bi bi-plus-lg me-1"></i>Add Project
            </button>
        </div>

        <!-- Alert -->
        <div id="projectAlert" class="alert d-none mb-3"></div>

        <!-- Projects Table -->
        <div class="admin-table">
            <table class="table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Tags</th>
                        <th>Featured</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="projectsTableBody">
                    <tr>
                        <td colspan="5">
                            <div class="loading-spinner">
                                <div class="spinner-border text-primary"></div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ── Add/Edit Project Modal ──────────────────────────── -->
<div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="projectModalTitle">
                    <i class="bi bi-plus-circle me-2 text-primary"></i>Add New Project
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm">
                    <input type="hidden" id="projectId">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Project Title *</label>
                            <input type="text" class="form-control" id="projectTitle"
                                   placeholder="E-Commerce Platform" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Project Link</label>
                            <input type="text" class="form-control" id="projectLink"
                                   placeholder="https://github.com/...">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description *</label>
                            <textarea class="form-control" id="projectDescription"
                                      rows="3" placeholder="Describe the project..." required></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Image URL</label>
                            <input type="text" class="form-control" id="projectImage"
                                   placeholder="https://... or images/project1.jpg">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label">Tags <span class="text-muted">(comma separated)</span></label>
                            <input type="text" class="form-control" id="projectTags"
                                   placeholder="React, Node.js, MongoDB">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Featured</label>
                            <div class="form-check form-switch mt-2">
                                <input class="form-check-input" type="checkbox" id="projectFeatured">
                                <label class="form-check-label text-light" for="projectFeatured">
                                    Mark as featured
                                </label>
                            </div>
                        </div>
                    </div>
                    <div id="formAlert" class="alert d-none mt-3"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveProjectBtn" onclick="saveProject()">
                    <i class="bi bi-check-lg me-1"></i>Save Project
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ── Delete Confirm Modal ────────────────────────────── -->
<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-danger">
                    <i class="bi bi-trash me-2"></i>Delete Project
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                Are you sure you want to delete <strong id="deleteProjectName"></strong>?
                This action cannot be undone.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">
                    <i class="bi bi-trash me-1"></i>Delete
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="scripts/api.js"></script>
<script>
// ── Guard: admin only ─────────────────────────────────────
requireAdmin();

// ── Init ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
    const user = getUser();
    if (user) document.getElementById('adminName').textContent = user.username;
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
    await loadDashboard();
    await loadProjects();
});

// ── Section Toggle ────────────────────────────────────────
function showSection(name) {
    document.querySelectorAll('[id^="section"]').forEach(s => s.classList.add('d-none'));
    document.getElementById(`section${name.charAt(0).toUpperCase() + name.slice(1)}`).classList.remove('d-none');
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'));
    event.target.closest('.sidebar-link')?.classList.add('active');
    return false;
}

// ── Load Dashboard Stats ──────────────────────────────────
let allProjects = [];

async function loadDashboard() {
    try {
        allProjects = await getProjects();
        document.getElementById('statProjects').textContent = allProjects.length;
        document.getElementById('statFeatured').textContent = allProjects.filter(p => p.featured).length;
        const tags = new Set(allProjects.flatMap(p => p.tags));
        document.getElementById('statTags').textContent = tags.size;

        // Recent 3 projects
        const recent = allProjects.slice(0, 3);
        const container = document.getElementById('recentProjectsList');
        if (recent.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="bi bi-folder-x" style="font-size:2rem"></i><p class="mt-2">No projects yet</p></div>`;
            return;
        }
        container.innerHTML = recent.map(p => `
            <div class="d-flex align-items-center gap-3 p-3" style="border-bottom:1px solid #2a2a2a">
                <div style="width:45px;height:45px;background:rgba(0,173,181,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#00adb5;">
                    <i class="bi bi-folder-fill"></i>
                </div>
                <div class="flex-grow-1">
                    <div style="font-weight:600">${p.title}</div>
                    <div style="font-size:0.8rem;color:#888">${p.tags.map(t => `<span class="tag-badge">${t}</span>`).join('')}</div>
                </div>
                ${p.featured ? '<span class="badge bg-warning text-dark">Featured</span>' : ''}
            </div>
        `).join('');
    } catch (err) {
        console.error('Dashboard load error:', err);
    }
}

// ── Load Projects Table ───────────────────────────────────
async function loadProjects() {
    try {
        allProjects = await getProjects();
        renderTable(allProjects);
    } catch (err) {
        document.getElementById('projectsTableBody').innerHTML =
            `<tr><td colspan="5" class="text-center text-danger">Failed to load projects</td></tr>`;
    }
}

function renderTable(projects) {
    const tbody = document.getElementById('projectsTableBody');
    if (projects.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><i class="bi bi-folder-x" style="font-size:2rem"></i><p>No projects yet. Add your first project!</p></div></td></tr>`;
        return;
    }
    tbody.innerHTML = projects.map(p => `
        <tr>
            <td>
                <div style="font-weight:600">${p.title}</div>
                <div style="font-size:0.75rem;color:#888">${new Date(p.createdAt).toLocaleDateString()}</div>
            </td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa">
                ${p.description}
            </td>
            <td>${p.tags.map(t => `<span class="tag-badge">${t}</span>`).join('') || '<span class="text-muted">—</span>'}</td>
            <td>${p.featured
                ? '<span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> Yes</span>'
                : '<span class="badge bg-secondary">No</span>'}</td>
            <td>
                <button class="btn btn-sm btn-teal me-1" onclick="openEditModal('${p._id}')">
                    <i class="bi bi-pencil-fill"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="openDeleteModal('${p._id}', '${p.title.replace(/'/g, "\\'")}')">
                    <i class="bi bi-trash-fill"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

// ── Add Modal ─────────────────────────────────────────────
function openAddModal() {
    document.getElementById('projectModalTitle').innerHTML =
        '<i class="bi bi-plus-circle me-2 text-primary"></i>Add New Project';
    document.getElementById('projectForm').reset();
    document.getElementById('projectId').value = '';
    document.getElementById('formAlert').classList.add('d-none');
}

// ── Edit Modal ────────────────────────────────────────────
function openEditModal(id) {
    const p = allProjects.find(p => p._id === id);
    if (!p) return;
    document.getElementById('projectModalTitle').innerHTML =
        '<i class="bi bi-pencil me-2 text-warning"></i>Edit Project';
    document.getElementById('projectId').value       = p._id;
    document.getElementById('projectTitle').value    = p.title;
    document.getElementById('projectDescription').value = p.description;
    document.getElementById('projectImage').value    = p.image || '';
    document.getElementById('projectTags').value     = p.tags.join(', ');
    document.getElementById('projectLink').value     = p.link || '';
    document.getElementById('projectFeatured').checked = p.featured;
    document.getElementById('formAlert').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('projectModal')).show();
}

// ── Save Project ──────────────────────────────────────────
async function saveProject() {
    const alertEl = document.getElementById('formAlert');
    alertEl.classList.add('d-none');

    const id          = document.getElementById('projectId').value;
    const title       = document.getElementById('projectTitle').value.trim();
    const description = document.getElementById('projectDescription').value.trim();
    const image       = document.getElementById('projectImage').value.trim();
    const tagsRaw     = document.getElementById('projectTags').value.trim();
    const link        = document.getElementById('projectLink').value.trim();
    const featured    = document.getElementById('projectFeatured').checked;

    if (!title || !description) {
        alertEl.className = 'alert alert-danger mt-3';
        alertEl.textContent = 'Title and description are required.';
        alertEl.classList.remove('d-none');
        return;
    }

    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    const btn  = document.getElementById('saveProjectBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving...';

    try {
        const projectData = { title, description, image, tags, link, featured };
        if (id) {
            await updateProject(id, projectData);
        } else {
            await createProject(projectData);
        }

        bootstrap.Modal.getInstance(document.getElementById('projectModal')).hide();
        await loadProjects();
        await loadDashboard();

        // Show success alert
        const mainAlert = document.getElementById('projectAlert');
        mainAlert.className = 'alert alert-success';
        mainAlert.textContent = id ? '✅ Project updated successfully!' : '✅ Project added successfully!';
        mainAlert.classList.remove('d-none');
        setTimeout(() => mainAlert.classList.add('d-none'), 3000);

    } catch (err) {
        alertEl.className = 'alert alert-danger mt-3';
        alertEl.textContent = err.message || 'Failed to save project.';
        alertEl.classList.remove('d-none');
    } finally {
        btn.disabled  = false;
        btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Save Project';
    }
}

// ── Delete Modal ──────────────────────────────────────────
function openDeleteModal(id, title) {
    document.getElementById('deleteProjectName').textContent = title;
    document.getElementById('confirmDeleteBtn').onclick = () => confirmDelete(id);
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
}

async function confirmDelete(id) {
    try {
        await deleteProject(id);
        bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
        await loadProjects();
        await loadDashboard();

        const mainAlert = document.getElementById('projectAlert');
        mainAlert.className = 'alert alert-success';
        mainAlert.textContent = '✅ Project deleted successfully!';
        mainAlert.classList.remove('d-none');
        setTimeout(() => mainAlert.classList.add('d-none'), 3000);
    } catch (err) {
        alert('Failed to delete: ' + err.message);
    }
}
</script>
</body>
</html>
